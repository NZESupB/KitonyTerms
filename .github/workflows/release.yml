# 三端打包与发布 / Cross-platform packaging & release
#
# 触发方式:
#   - 推送 v* 标签(如 v0.1.0)→ 构建三端产物并创建 GitHub Release
#   - 手动触发(workflow_dispatch)→ 仅构建并上传 artifacts,便于验证打包流程
#
# 产物覆盖:Linux x86_64、macOS(aarch64 + x86_64)、Windows x86_64。
# 二进制名为 kitonyterms(来自 kt-app crate)。
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# 允许 release job 创建 Release 并上传资产。
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Cargo.lock 已提交,统一使用 --locked 保证可复现构建。
  CARGO_INCREMENTAL: "0"

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - name: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      # egui/eframe(winit + wgpu)与 rfd(GTK3 后端)在 Linux 上的构建依赖。
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libwayland-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release -p kt-app --target ${{ matrix.target }}

      # 统一打包:类 Unix 平台输出 .tar.gz,Windows 输出 .zip。
      # 归档内含可执行文件与许可证/说明文档。
      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          version="${GITHUB_REF_NAME:-dev}"
          staging="kitonyterms-${version}-${{ matrix.name }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/kitonyterms" "$staging/"
          cp README.md README.zh-CN.md "$staging/" 2>/dev/null || true
          tar -czf "${staging}.tar.gz" "$staging"
          echo "ASSET=${staging}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "dev" }
          $staging = "kitonyterms-$version-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/kitonyterms.exe" $staging
          Copy-Item README.md, README.zh-CN.md $staging -ErrorAction SilentlyContinue
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"
          "ASSET=$staging.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  # 仅在打 tag 时汇总所有平台产物并创建 Release。
  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
